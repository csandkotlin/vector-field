<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vector Field: Fortress Defense | Updated</title>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            background: radial-gradient(circle at center, #0a0f0a, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Courier New', 'Fira Code', monospace;
            overflow: hidden;
            cursor: none;
        }
        .game-wrapper { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .game-container { 
            position: relative; 
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2); 
            border-radius: 16px; 
            background: #000; 
            padding: 4px;
        }
        canvas { 
            display: block; 
            margin: 0 auto; 
            border-radius: 12px; 
            box-shadow: 0 0 0 2px #1a4d1a; 
            cursor: none;
        }
        .status {
            position: absolute; top: 16px; left: 20px;
            background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(3px);
            padding: 6px 14px; border-left: 4px solid #00ff66;
            font-weight: bold; font-size: 14px; z-index: 10;
            pointer-events: none; border-radius: 0 12px 12px 0;
            color: #bbffbb; text-shadow: 0 0 4px #00aa33;
        }
        .stats-panel {
            position: absolute; top: 16px; right: 20px;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(3px);
            padding: 6px 16px; border-radius: 20px;
            font-family: monospace; font-size: 14px; font-weight: bold;
            color: #0f0; border: 1px solid #2a6b2a;
            text-align: right; pointer-events: none; z-index: 10;
        }
        .respawn-area {
            display: flex; gap: 15px; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.8); padding: 8px 20px;
            border-radius: 40px; border: 1px solid #ff6600;
            backdrop-filter: blur(4px);
        }
        .respawn-timer {
            background: linear-gradient(135deg, #1a3a1a, #0a2a0a);
            color: #ffaa66; border: none; padding: 8px 24px;
            border-radius: 30px; font-family: monospace;
            font-weight: bold; font-size: 14px;
            box-shadow: 0 0 10px rgba(255,102,0,0.3);
        }
        .respawn-hint { color: #ffaa66; font-family: monospace; font-size: 13px; font-weight: bold; }
        .respawn-hint kbd { background: #333; padding: 2px 8px; border-radius: 5px; color: #ffaa66; margin: 0 3px; }
        .instruction {
            position: absolute; bottom: 18px; left: 0; right: 0;
            text-align: center; font-size: 11px; color: #4a8f4a;
            background: rgba(0,0,0,0.5); width: fit-content; margin: 0 auto;
            padding: 4px 12px; border-radius: 20px; font-family: monospace;
            pointer-events: none; backdrop-filter: blur(2px);
        }
        .play-again-btn {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff6600;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-family: monospace;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 0 20px rgba(255,102,0,0.5);
            transition: all 0.2s;
            animation: btnPulse 1s infinite;
        }
        .play-again-btn:hover {
            transform: translateX(-50%) scale(1.05);
            background: #ff8844;
        }
        .movement-lock-indicator {
            position: absolute;
            bottom: 80px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 4px 12px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 12px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
        }
        .build-progress {
            position: absolute;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            padding: 6px 20px;
            border-radius: 30px;
            font-family: monospace;
            font-weight: bold;
            font-size: 14px;
            color: #ffaa44;
            border: 1px solid #ffaa44;
            pointer-events: none;
            z-index: 10;
            white-space: nowrap;
        }
        @keyframes btnPulse { 0%,100%{opacity:1;} 50%{opacity:0.7;} }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-container">
        <canvas id="gameCanvas" width="1000" height="700"></canvas>
        <div class="movement-lock-indicator" id="lockIndicator">🔓 DI CHUYỂN: BẬT</div>
        <div class="build-progress" id="buildProgress" style="display: none;">🏗️ ĐANG XÂY... 0%</div>
    </div>
    <div class="respawn-area">
        <div class="respawn-timer" id="respawnTimer">🤖 RESPAWN IN: --s</div>
        <div class="respawn-hint">🎮 <kbd>R</kbd> - RESPAWN BOT (50)</div>
    </div>
    <div class="status">⚡ FORTRESS DEFENSE | HP 20 | RAPID FIRE ⚡</div>
    <div class="stats-panel">
        ❤️ HP: <span id="hpDisplay" style="color:#ff5e5e;">20</span>&nbsp;&nbsp;|&nbsp;
        🎯 SCORE: <span id="scoreDisplay">0</span>&nbsp;&nbsp;|&nbsp;
        🤖 BOT: <span id="botStatus" style="color:#44aaff;">ACTIVE</span>&nbsp;&nbsp;|&nbsp;
        🧱 FORTS: <span id="fortCount">0</span><span id="fortLimit" style="font-size:10px;color:#aaa;">/10</span>
    </div>
    <div class="instruction">
        🖱️ CLICK TRÁI 1 LẦN: KHOÁ DI CHUYỂN | GIỮ CHUỘT 3s: XÂY CÔNG SỰ (30 ĐIỂM, MAX 10) | 💥 BOOM SHOOTER ĐẠN XUYÊN
    </div>
</div>

<script>
    (function() {
        // KÍCH THƯỚC MAP & CAMERA
        const MAP_W = 2500, MAP_H = 2500;
        const CAM_W = 1000, CAM_H = 700;
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = CAM_W;
        canvas.height = CAM_H;
        
        const hpSpan = document.getElementById('hpDisplay');
        const scoreSpan = document.getElementById('scoreDisplay');
        const botStatusSpan = document.getElementById('botStatus');
        const respawnTimerDiv = document.getElementById('respawnTimer');
        const fortCountSpan = document.getElementById('fortCount');
        const lockIndicator = document.getElementById('lockIndicator');
        const fortLimitSpan = document.getElementById('fortLimit');
        const buildProgressDiv = document.getElementById('buildProgress');
        
        let gameActive = true;
        let health = 20;
        let score = 0;
        let cameraX = 0, cameraY = 0;
        
        // NGƯỜI CHƠI
        let player = { x: MAP_W/2, y: MAP_H/2, radius: 16 };
        const PLAYER_SPEED = 6.2;
        let mouseWorld = { x: MAP_W/2, y: MAP_H/2 };
        let mouseInside = true;
        let movementLocked = false;
        
        // XÂY DỰNG BẰNG GIỮ CHUỘT
        let mouseHoldStart = 0;
        let isHolding = false;
        let buildRequested = false;
        const BUILD_HOLD_TIME = 3000; // 3 giây
        
        // CÔNG SỰ
        let forts = [];
        const MAX_FORTS = 10;
        const FORT_COST = 30;
        
        // HIỆU ỨNG
        let healEffects = [];
        let teleporters = [];
        let teleportCooldown = 0;
        const TELEPORT_INTERVAL = 450;
        
        // VẬT CẢN
        let obstacles = [];
        const OBSTACLE_COUNT = 25;
        
        // ĐẠN
        let bullets = [], botBullets = [], enemyBullets = [], boomBullets = [];
        let explosions = [];
        const BULLET_RADIUS = 5, BULLET_SPEED = 7.2;
        let shootTimer = 0;
        const SHOOT_DELAY_FRAMES = 4;
        let nextEnemyId = 1;
        
        // BOT ĐỒNG MINH
        let supportBot = {
            x: MAP_W/2 - 45, y: MAP_H/2 + 30, radius: 12,
            active: true, shootTimer: 0, shootDelay: 7,
            hp: 5, maxHp: 5,
            healTimer: 0, healDelay: 550,
            selfHealTimer: 0, selfHealDelay: 450
        };
        
        let botRespawnTimer = 0;
        const botRespawnCooldown = 30;
        
        // ENEMY
        let enemies = [];
        let enemySpawnCooldown = 0;
        const MAX_ENEMIES = 40;
        const RESPAWN_THRESHOLD = 25;
        const BASE_SPAWN_DELAY = 50;
        
        // KHỞI TẠO MAP
        function generateObstacles() {
            obstacles = [];
            for (let i = 0; i < OBSTACLE_COUNT; i++) {
                let width = 35 + Math.random() * 50;
                let height = 35 + Math.random() * 50;
                let x = 80 + Math.random() * (MAP_W - width - 80);
                let y = 80 + Math.random() * (MAP_H - height - 80);
                if (Math.hypot(x + width/2 - MAP_W/2, y + height/2 - MAP_H/2) < 150) continue;
                obstacles.push({ x: x, y: y, w: width, h: height, type: Math.random() > 0.6 ? 'building' : 'wall' });
            }
        }
        
        // KIỂM TRA VA CHẠM
        function checkCollisionWithObstaclesForPlayer(entity, radius) {
            for (let obs of obstacles) {
                let closestX = Math.max(obs.x, Math.min(entity.x, obs.x + obs.w));
                let closestY = Math.max(obs.y, Math.min(entity.y, obs.y + obs.h));
                let dx = entity.x - closestX, dy = entity.y - closestY;
                let distSq = dx * dx + dy * dy;
                if (distSq < radius * radius) {
                    let angle = Math.atan2(dy, dx);
                    let overlap = radius - Math.sqrt(distSq);
                    entity.x += Math.cos(angle) * overlap;
                    entity.y += Math.sin(angle) * overlap;
                    return true;
                }
            }
            return false;
        }
        
        function checkCollisionWithObstaclesForEnemy(entity, radius) {
            for (let obs of obstacles) {
                let closestX = Math.max(obs.x, Math.min(entity.x, obs.x + obs.w));
                let closestY = Math.max(obs.y, Math.min(entity.y, obs.y + obs.h));
                let dx = entity.x - closestX, dy = entity.y - closestY;
                let distSq = dx * dx + dy * dy;
                if (distSq < radius * radius) {
                    let angle = Math.atan2(dy, dx);
                    let overlap = radius - Math.sqrt(distSq);
                    entity.x += Math.cos(angle) * overlap;
                    entity.y += Math.sin(angle) * overlap;
                    return true;
                }
            }
            return false;
        }
        
        // Shooter tìm vật cản để núp (KHÔNG lao vào)
        function findCoverObstacle(x, y) {
            let best = null;
            let bestDist = Infinity;
            for (let obs of obstacles) {
                let obsCenterX = obs.x + obs.w/2;
                let obsCenterY = obs.y + obs.h/2;
                let distToPlayer = Math.hypot(player.x - obsCenterX, player.y - obsCenterY);
                let distToSelf = Math.hypot(x - obsCenterX, y - obsCenterY);
                // Chọn vật cản gần và che chắn tốt
                if (distToSelf < bestDist && distToSelf < 200 && distToPlayer > 100) {
                    bestDist = distToSelf;
                    best = obs;
                }
            }
            return best;
        }
        
        function checkCollisionWithFortsForEnemy(entity, radius) {
            for (let fort of forts) {
                if (!fort.active) continue;
                let closestX = Math.max(fort.x, Math.min(entity.x, fort.x + fort.w));
                let closestY = Math.max(fort.y, Math.min(entity.y, fort.y + fort.h));
                let dx = entity.x - closestX, dy = entity.y - closestY;
                let distSq = dx * dx + dy * dy;
                if (distSq < radius * radius) {
                    let angle = Math.atan2(dy, dx);
                    let overlap = radius - Math.sqrt(distSq);
                    entity.x += Math.cos(angle) * overlap;
                    entity.y += Math.sin(angle) * overlap;
                    return true;
                }
            }
            return false;
        }
        
        function bulletCollidesWithObstacles(bullet, isPlayerBullet) {
            for (let obs of obstacles) {
                if (bullet.x > obs.x && bullet.x < obs.x + obs.w && bullet.y > obs.y && bullet.y < obs.y + obs.h) {
                    return true;
                }
            }
            if (!isPlayerBullet) {
                for (let fort of forts) {
                    if (!fort.active) continue;
                    if (bullet.x > fort.x && bullet.x < fort.x + fort.w && bullet.y > fort.y && bullet.y < fort.y + fort.h) {
                        return true;
                    }
                }
            }
            return false;
        }
        
        // ĐẶT CÔNG SỰ (GIỮ CHUỘT)
        function tryPlaceFort() {
            if (!gameActive) return false;
            if (score < FORT_COST) return false;
            let activeForts = forts.filter(f => f.active).length;
            if (activeForts >= MAX_FORTS) return false;
            
            let fortX = mouseWorld.x - 30;
            let fortY = mouseWorld.y - 30;
            let fortW = 60;
            let fortH = 60;
            
            if (Math.abs(player.x - (fortX + fortW/2)) < player.radius + fortW/2 &&
                Math.abs(player.y - (fortY + fortH/2)) < player.radius + fortH/2) return false;
            
            for (let f of forts) {
                if (Math.abs(f.x - fortX) < f.w && Math.abs(f.y - fortY) < f.h) return false;
            }
            
            for (let obs of obstacles) {
                if (fortX < obs.x + obs.w && fortX + fortW > obs.x && fortY < obs.y + obs.h && fortY + fortH > obs.y) return false;
            }
            
            score -= FORT_COST;
            forts.push({
                x: fortX, y: fortY, w: fortW, h: fortH,
                hp: 15, maxHp: 15, active: true
            });
            updateUI();
            return true;
        }
        
        function healPlayer() {
            if (health < 20) {
                health++;
                updateUI();
                healEffects.push({ x: player.x, y: player.y, timer: 20 });
                return true;
            }
            return false;
        }
        
        function healBot() {
            if (supportBot.active && supportBot.hp < supportBot.maxHp) {
                supportBot.hp++;
                updateUI();
                return true;
            }
            return false;
        }
        
        // TELEPORTER
        function spawnTeleporter() {
            if (teleportCooldown <= 0) {
                let angle = Math.random() * Math.PI * 2;
                let distance = 280 + Math.random() * 200;
                let x = player.x + Math.cos(angle) * distance;
                let y = player.y + Math.sin(angle) * distance;
                x = Math.min(Math.max(x, 80), MAP_W - 80);
                y = Math.min(Math.max(y, 80), MAP_H - 80);
                teleporters.push({ x: x, y: y, radius: 22, timer: 150 });
                teleportCooldown = TELEPORT_INTERVAL;
            } else {
                teleportCooldown--;
            }
        }
        
        function spawnBomberAt(x, y) {
            let bomberCount = enemies.filter(e => e.type === 'bomber').length;
            if (bomberCount > 5) return;
            
            let dx = player.x - x, dy = player.y - y;
            let length = Math.hypot(dx, dy);
            if (length < 0.001) length = 1;
            const vx = (dx / length) * 0.85;
            const vy = (dy / length) * 0.85;
            
            enemies.push({
                id: nextEnemyId++,
                x: x, y: y, vx: vx, vy: vy, r: 13,
                type: 'bomber', hp: 4, maxHp: 4, color: '#ff6633', points: 10,
                shootCooldown: 0,
                explosionTimer: 70,
                isSquadMember: false
            });
            
            explosions.push({ x: x, y: y, timer: 18, isWarning: false, isTeleportSpawn: true });
        }
        
        function handleTeleporters() {
            for (let i = 0; i < teleporters.length; i++) {
                const tp = teleporters[i];
                tp.timer--;
                
                if (Math.hypot(player.x - tp.x, player.y - tp.y) < player.radius + tp.radius) {
                    spawnBomberAt(tp.x, tp.y);
                    teleporters.splice(i, 1);
                    i--;
                    continue;
                }
                
                if (tp.timer <= 0) {
                    teleporters.splice(i, 1);
                    i--;
                }
            }
        }
        
        function removeBulletsFromShooter(shooterId) {
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                if (enemyBullets[i].shooterId === shooterId) {
                    enemyBullets.splice(i, 1);
                }
            }
            for (let i = boomBullets.length - 1; i >= 0; i--) {
                if (boomBullets[i].shooterId === shooterId) {
                    boomBullets.splice(i, 1);
                }
            }
        }
        
        // SPAWN BOOM SHOOTER (phổ biến hơn)
        function spawnBoomShooter() {
            let side = Math.floor(Math.random() * 4);
            let x, y;
            const padding = 60;
            if (side === 0) { x = -padding; y = Math.random() * MAP_H; }
            else if (side === 1) { x = MAP_W + padding; y = Math.random() * MAP_H; }
            else if (side === 2) { x = Math.random() * MAP_W; y = -padding; }
            else { x = Math.random() * MAP_W; y = MAP_H + padding; }
            
            let dx = player.x - x, dy = player.y - y;
            let length = Math.hypot(dx, dy);
            if (length < 0.001) length = 1;
            const vx = (dx / length) * 1.1;
            const vy = (dy / length) * 1.1;
            
            enemies.push({
                id: nextEnemyId++,
                x: x, y: y, vx: vx, vy: vy, r: 12,
                type: 'boomshooter', hp: 3, maxHp: 3, color: '#ff44ff', points: 10,
                shootCooldown: 0,
                explosionTimer: 300,
                isSquadMember: false
            });
        }
        
        // Boom Shooter bắn đạn XUYÊN (không va chạm vật cản, công sự)
        function boomShooterShoot(shooter) {
            let dx = player.x - shooter.x, dy = player.y - shooter.y;
            let len = Math.hypot(dx, dy);
            if (len < 0.001) len = 1;
            const normX = dx / len, normY = dy / len;
            boomBullets.push({ 
                x: shooter.x, y: shooter.y, 
                vx: normX * 3.2, vy: normY * 3.2, 
                radius: 6, damage: 2, 
                shooterId: shooter.id,
                explosionRadius: 35
            });
        }
        
        // Xử lý đạn nổ của boom shooter (XUYÊN - không va chạm vật cản)
        function handleBoomBullets() {
            for (let i = boomBullets.length-1; i >= 0; i--) {
                const bullet = boomBullets[i];
                bullet.x += bullet.vx;
                bullet.y += bullet.vy;
                
                // Kiểm tra va chạm với player
                if (Math.hypot(bullet.x - player.x, bullet.y - player.y) < bullet.radius + player.radius) {
                    health -= bullet.damage;
                    updateUI();
                    explosions.push({ x: bullet.x, y: bullet.y, timer: 15, isBig: false, isBoom: true, boomRadius: bullet.explosionRadius });
                    boomBullets.splice(i, 1);
                    if (health <= 0) gameActive = false;
                    continue;
                }
                
                // Xóa đạn nếu ra khỏi map
                if (bullet.x < -100 || bullet.x > MAP_W + 100 || bullet.y < -100 || bullet.y > MAP_H + 100) {
                    boomBullets.splice(i, 1);
                }
            }
        }
        
        // SPAWN ENEMY
        function shouldSpawnSquad() {
            if (score < 700) return false;
            let milestone = Math.floor(score / 100) * 100;
            if (milestone < 700) return false;
            if (!window.spawnedMilestones) window.spawnedMilestones = {};
            if (window.spawnedMilestones[milestone]) return false;
            
            if (Math.random() < 0.2) {
                window.spawnedMilestones[milestone] = true;
                return true;
            }
            return false;
        }
        
        function spawnEnemy() {
            if (!gameActive) return;
            if (enemies.length >= MAX_ENEMIES) return;
            
            if (shouldSpawnSquad()) {
                spawnShooterPair();
                return;
            }
            
            let type = 'normal';
            const rand = Math.random();
            
            // Tỷ lệ spawn: BoomShooter phổ biến hơn, spawn cùng bomber
            if (score > 100) {
                if (rand < 0.05) type = 'runner';
                else if (rand < 0.15) type = 'tanker';
                else if (rand < 0.25) type = 'shooter';
                else if (rand < 0.40) type = 'bomber';
                else if (rand < 0.60) type = 'boomshooter';
                else type = 'normal';
            } else if (score > 50) {
                if (rand < 0.04) type = 'runner';
                else if (rand < 0.12) type = 'tanker';
                else if (rand < 0.20) type = 'shooter';
                else if (rand < 0.32) type = 'bomber';
                else if (rand < 0.48) type = 'boomshooter';
                else type = 'normal';
            } else {
                if (rand < 0.03) type = 'runner';
                else if (rand < 0.10) type = 'tanker';
                else if (rand < 0.18) type = 'bomber';
                else type = 'normal';
            }
            
            if (type === 'boomshooter') {
                spawnBoomShooter();
            } else {
                spawnSingleEnemy(type);
            }
        }
        
        function spawnShooterPair() {
            if (enemies.length >= MAX_ENEMIES - 1) return;
            
            let side = Math.floor(Math.random() * 4);
            let baseX, baseY;
            const padding = 80;
            
            if (side === 0) { baseX = -padding; baseY = Math.random() * MAP_H; }
            else if (side === 1) { baseX = MAP_W + padding; baseY = Math.random() * MAP_H; }
            else if (side === 2) { baseX = Math.random() * MAP_W; baseY = -padding; }
            else { baseX = Math.random() * MAP_W; baseY = MAP_H + padding; }
            
            const offsets = [[-30, -20], [30, 20]];
            
            for (let i = 0; i < 2; i++) {
                if (enemies.length >= MAX_ENEMIES) break;
                let x = baseX + offsets[i][0];
                let y = baseY + offsets[i][1];
                x = Math.min(Math.max(x, 20), MAP_W - 20);
                y = Math.min(Math.max(y, 20), MAP_H - 20);
                
                let dx = player.x - x;
                let dy = player.y - y;
                let length = Math.hypot(dx, dy);
                if (length < 0.001) length = 1;
                const speed = 0.9 + Math.floor(score / 500) * 0.12;
                const vx = (dx / length) * Math.min(speed, 2.2);
                const vy = (dy / length) * Math.min(speed, 2.2);
                
                enemies.push({
                    id: nextEnemyId++,
                    x: x, y: y, vx: vx, vy: vy, r: 11,
                    type: 'shooter', hp: 2, maxHp: 2, color: '#ff44aa', points: 8,
                    shootCooldown: Math.floor(20 + Math.random() * 30),
                    explosionTimer: 0,
                    isSquadMember: true
                });
            }
            
            explosions.push({ x: baseX, y: baseY, timer: 15, isWarning: true });
        }
        
        function spawnSingleEnemy(type) {
            let side = Math.floor(Math.random() * 4);
            let x, y;
            const padding = 50;
            if (side === 0) { x = -padding; y = Math.random() * MAP_H; }
            else if (side === 1) { x = MAP_W + padding; y = Math.random() * MAP_H; }
            else if (side === 2) { x = Math.random() * MAP_W; y = -padding; }
            else { x = Math.random() * MAP_W; y = MAP_H + padding; }
            
            let radius, speed, hp, color, points;
            switch(type) {
                case 'runner': radius = 8; speed = 2.4; hp = 1; color = '#ffaa44'; points = 8; break;
                case 'tanker': radius = 16; speed = 0.65; hp = 4; color = '#aa66ff'; points = 15; break;
                case 'shooter': radius = 11; speed = 0.95; hp = 2; color = '#ff44aa'; points = 8; break;
                case 'bomber': radius = 13; speed = 0.6; hp = 4; color = '#ff6633'; points = 10; break;
                default: radius = 9 + Math.random() * 5; speed = 1.1; hp = 1; color = `hsl(${Math.random() * 360}, 85%, 58%)`; points = 5;
            }
            speed = Math.min(speed, 2.8);
            if (type === 'runner') speed = Math.min(speed, 2.6);
            
            let dx = player.x - x, dy = player.y - y;
            let length = Math.hypot(dx, dy);
            if (length < 0.001) length = 1;
            const vx = (dx / length) * speed;
            const vy = (dy / length) * speed;
            
            enemies.push({
                id: nextEnemyId++,
                x: x, y: y, vx: vx, vy: vy, r: radius,
                type: type, hp: hp, maxHp: hp, color: color, points: points,
                shootCooldown: 0,
                explosionTimer: type === 'bomber' ? Math.floor(150 + Math.random() * 150) : 0,
                isSquadMember: false,
                coverObstacle: null
            });
        }
        
        // BẮN
        function shootTowardsMouse() {
            if (!gameActive) return;
            let dx = mouseWorld.x - player.x, dy = mouseWorld.y - player.y;
            let len = Math.hypot(dx, dy);
            if (len < 0.001) { dx = 1; dy = 0; len = 1; }
            const normX = dx / len, normY = dy / len;
            bullets.push({ x: player.x, y: player.y, vx: normX * BULLET_SPEED, vy: normY * BULLET_SPEED, radius: BULLET_RADIUS, damage: 1 });
        }
        
        function shootFromBot() {
            if (!gameActive || !supportBot.active || enemies.length === 0) return;
            
            let priorityEnemy = null;
            let priorityScore = -1;
            
            for (let enemy of enemies) {
                let scoreVal = 0;
                const distToPlayer = Math.hypot(enemy.x - player.x, enemy.y - player.y);
                const distToBot = Math.hypot(enemy.x - supportBot.x, enemy.y - supportBot.y);
                
                if (enemy.type === 'shooter') scoreVal += 30;
                if (enemy.type === 'boomshooter') scoreVal += 40;
                if (enemy.type === 'runner') scoreVal += 20;
                if (enemy.type === 'bomber') scoreVal += 25;
                if (distToPlayer < 200) scoreVal += 40;
                if (distToBot < 250) scoreVal += 20;
                
                if (scoreVal > priorityScore) {
                    priorityScore = scoreVal;
                    priorityEnemy = enemy;
                }
            }
            
            if (priorityEnemy) {
                let dx = priorityEnemy.x - supportBot.x, dy = priorityEnemy.y - supportBot.y;
                let len = Math.hypot(dx, dy);
                if (len < 0.001) len = 1;
                const normX = dx / len, normY = dy / len;
                botBullets.push({ x: supportBot.x, y: supportBot.y, vx: normX * (BULLET_SPEED - 1), vy: normY * (BULLET_SPEED - 1), radius: BULLET_RADIUS - 1, damage: 1 });
            }
        }
        
        function enemyShoot(shooter) {
            let dx = player.x - shooter.x, dy = player.y - shooter.y;
            let len = Math.hypot(dx, dy);
            if (len < 0.001) len = 1;
            const normX = dx / len, normY = dy / len;
            enemyBullets.push({ 
                x: shooter.x, y: shooter.y, 
                vx: normX * 3.3, vy: normY * 3.3, 
                radius: 4, damage: 1, 
                shooterId: shooter.id 
            });
        }
        
        // CẬP NHẬT
        function updatePlayer() {
            if (!gameActive || movementLocked) return;
            
            let dx = mouseWorld.x - player.x, dy = mouseWorld.y - player.y;
            let distance = Math.hypot(dx, dy);
            if (distance < 4) return;
            let moveSpeed = PLAYER_SPEED;
            if (distance < 25) moveSpeed = Math.max(PLAYER_SPEED * (distance / 25), 1.5);
            let move = Math.min(moveSpeed, distance);
            player.x += (dx / distance) * move;
            player.y += (dy / distance) * move;
            player.x = Math.min(Math.max(player.x, 20), MAP_W - 20);
            player.y = Math.min(Math.max(player.y, 20), MAP_H - 20);
            
            checkCollisionWithObstaclesForPlayer(player, player.radius);
        }
        
        function updateSupportBot() {
            if (!gameActive) return;
            
            if (!supportBot.active && gameActive && health > 0) {
                if (botRespawnTimer > 0) { 
                    botRespawnTimer--; 
                    updateUI(); 
                }
                else if (botRespawnTimer === 0) { 
                    autoRespawnBot(); 
                }
            }
            
            if (!supportBot.active) { updateUI(); return; }
            
            if (supportBot.healTimer <= 0) {
                if (healPlayer()) {
                    healEffects.push({ x: supportBot.x, y: supportBot.y, timer: 20, fromBot: true });
                }
                supportBot.healTimer = supportBot.healDelay;
            } else {
                supportBot.healTimer--;
            }
            
            if (supportBot.selfHealTimer <= 0) {
                if (healBot()) {}
                supportBot.selfHealTimer = supportBot.selfHealDelay;
            } else {
                supportBot.selfHealTimer--;
            }
            
            let dodgeX = 0, dodgeY = 0;
            for (let bullet of enemyBullets) {
                let dx = supportBot.x - bullet.x;
                let dy = supportBot.y - bullet.y;
                let dist = Math.hypot(dx, dy);
                if (dist < 80 && dist > 0) {
                    let force = (80 - dist) / 80;
                    dodgeX += (dx / dist) * force * 4;
                    dodgeY += (dy / dist) * force * 4;
                }
            }
            for (let bullet of boomBullets) {
                let dx = supportBot.x - bullet.x;
                let dy = supportBot.y - bullet.y;
                let dist = Math.hypot(dx, dy);
                if (dist < 100 && dist > 0) {
                    let force = (100 - dist) / 100;
                    dodgeX += (dx / dist) * force * 5;
                    dodgeY += (dy / dist) * force * 5;
                }
            }
            
            for (let enemy of enemies) {
                let dx = supportBot.x - enemy.x;
                let dy = supportBot.y - enemy.y;
                let dist = Math.hypot(dx, dy);
                if (dist < 70 && dist > 0) {
                    let force = (70 - dist) / 70;
                    dodgeX += (dx / dist) * force * 3;
                    dodgeY += (dy / dist) * force * 3;
                }
            }
            
            const time = Date.now() / 1000;
            let orbitX = Math.cos(time * 1.5) * 70;
            let orbitY = Math.sin(time * 1.8) * 55;
            let targetX = player.x + orbitX + dodgeX;
            let targetY = player.y + orbitY + dodgeY;
            
            targetX = Math.min(Math.max(targetX, supportBot.radius + 10), MAP_W - supportBot.radius - 10);
            targetY = Math.min(Math.max(targetY, supportBot.radius + 10), MAP_H - supportBot.radius - 10);
            supportBot.x = supportBot.x * 0.9 + targetX * 0.1;
            supportBot.y = supportBot.y * 0.9 + targetY * 0.1;
            supportBot.x = Math.min(Math.max(supportBot.x, supportBot.radius + 5), MAP_W - supportBot.radius - 5);
            supportBot.y = Math.min(Math.max(supportBot.y, supportBot.radius + 5), MAP_H - supportBot.radius - 5);
            
            checkCollisionWithObstaclesForEnemy(supportBot, supportBot.radius);
            checkCollisionWithFortsForEnemy(supportBot, supportBot.radius);
        }
        
        function autoRespawnBot() {
            if (!supportBot.active && gameActive && health > 0 && botRespawnTimer <= 0) {
                supportBot.active = true;
                supportBot.hp = supportBot.maxHp;
                supportBot.x = player.x - 45;
                supportBot.y = player.y + 30;
                supportBot.healTimer = 0;
                supportBot.selfHealTimer = 0;
                updateUI();
            }
        }
        
        function respawnBotInstant() {
            if (!supportBot.active && score >= 50 && gameActive && health > 0) {
                score -= 50;
                supportBot.active = true;
                supportBot.hp = supportBot.maxHp;
                supportBot.x = player.x - 45;
                supportBot.y = player.y + 30;
                supportBot.healTimer = 0;
                supportBot.selfHealTimer = 0;
                botRespawnTimer = 0;
                updateUI();
            }
        }
        
        function updateBullets() {
            for (let i = bullets.length-1; i >= 0; i--) {
                bullets[i].x += bullets[i].vx;
                bullets[i].y += bullets[i].vy;
                if (bullets[i].x < -100 || bullets[i].x > MAP_W + 100 || bullets[i].y < -100 || bullets[i].y > MAP_H + 100 ||
                    bulletCollidesWithObstacles(bullets[i], true)) {
                    bullets.splice(i, 1);
                }
            }
            for (let i = botBullets.length-1; i >= 0; i--) {
                botBullets[i].x += botBullets[i].vx;
                botBullets[i].y += botBullets[i].vy;
                if (botBullets[i].x < -100 || botBullets[i].x > MAP_W + 100 || botBullets[i].y < -100 || botBullets[i].y > MAP_H + 100 ||
                    bulletCollidesWithObstacles(botBullets[i], false)) {
                    botBullets.splice(i, 1);
                }
            }
            for (let i = enemyBullets.length-1; i >= 0; i--) {
                enemyBullets[i].x += enemyBullets[i].vx;
                enemyBullets[i].y += enemyBullets[i].vy;
                if (enemyBullets[i].x < -100 || enemyBullets[i].x > MAP_W + 100 || enemyBullets[i].y < -100 || enemyBullets[i].y > MAP_H + 100 ||
                    bulletCollidesWithObstacles(enemyBullets[i], false)) {
                    enemyBullets.splice(i, 1);
                }
            }
        }
        
        function triggerBomberExplosion(bomber, index) {
            if (!bomber || bomber.hp <= 0) return;
            
            const EXPLOSION_RADIUS = 160;
            const distToPlayer = Math.hypot(player.x - bomber.x, player.y - bomber.y);
            if (distToPlayer < EXPLOSION_RADIUS) {
                health -= 4;
                updateUI();
                if (health <= 0) gameActive = false;
            }
            for (let f of forts) {
                if (!f.active) continue;
                const distToFort = Math.hypot((bomber.x - (f.x + f.w/2)), (bomber.y - (f.y + f.h/2)));
                if (distToFort < EXPLOSION_RADIUS) {
                    f.hp = 0;
                    f.active = false;
                }
            }
            for (let k = enemies.length-1; k >= 0; k--) {
                const other = enemies[k];
                if (other !== bomber && Math.hypot(other.x - bomber.x, other.y - bomber.y) < EXPLOSION_RADIUS) {
                    score += other.points;
                    removeBulletsFromShooter(other.id);
                    enemies.splice(k, 1);
                }
            }
            explosions.push({ x: bomber.x, y: bomber.y, timer: 20, isBig: true });
            removeBulletsFromShooter(bomber.id);
            enemies.splice(index, 1);
            updateUI();
        }
        
        function handleBomberExplosions() {
            const EXPLOSION_RADIUS = 160;
            
            for (let i = 0; i < enemies.length; i++) {
                const e = enemies[i];
                if (e.type === 'bomber' && e.hp > 0) {
                    if (e.explosionTimer > 0) e.explosionTimer--;
                    if (e.explosionTimer <= 0 && e.hp > 0) {
                        const distToPlayer = Math.hypot(player.x - e.x, player.y - e.y);
                        if (distToPlayer < EXPLOSION_RADIUS) {
                            health -= 4;
                            updateUI();
                            if (health <= 0) gameActive = false;
                        }
                        for (let f of forts) {
                            if (!f.active) continue;
                            const distToFort = Math.hypot((e.x - (f.x + f.w/2)), (e.y - (f.y + f.h/2)));
                            if (distToFort < EXPLOSION_RADIUS) {
                                f.hp = 0;
                                f.active = false;
                            }
                        }
                        for (let j = enemies.length-1; j >= 0; j--) {
                            const other = enemies[j];
                            if (other !== e && Math.hypot(other.x - e.x, other.y - e.y) < EXPLOSION_RADIUS) {
                                score += other.points;
                                removeBulletsFromShooter(other.id);
                                enemies.splice(j, 1);
                            }
                        }
                        explosions.push({ x: e.x, y: e.y, timer: 20, isBig: true });
                        removeBulletsFromShooter(e.id);
                        enemies.splice(i, 1);
                        i--;
                        updateUI();
                    }
                }
                else if (e.type === 'boomshooter' && e.hp > 0) {
                    if (e.explosionTimer > 0) e.explosionTimer--;
                    if (e.explosionTimer <= 0 && e.hp > 0) {
                        const distToPlayer = Math.hypot(player.x - e.x, player.y - e.y);
                        if (distToPlayer < 80) {
                            health -= 3;
                            updateUI();
                            if (health <= 0) gameActive = false;
                        }
                        explosions.push({ x: e.x, y: e.y, timer: 18, isBig: false, isBoom: true, boomRadius: 80 });
                        removeBulletsFromShooter(e.id);
                        enemies.splice(i, 1);
                        i--;
                        updateUI();
                    }
                }
            }
        }
        
        function handleCollisionsBulletEnemy() {
            for (let i = bullets.length-1; i >= 0; i--) {
                const bullet = bullets[i];
                for (let j = 0; j < enemies.length; j++) {
                    const e = enemies[j];
                    if (Math.hypot(bullet.x - e.x, bullet.y - e.y) < bullet.radius + e.r) {
                        e.hp -= bullet.damage;
                        bullets.splice(i, 1);
                        if (e.hp <= 0) {
                            if (e.type === 'bomber') {
                                triggerBomberExplosion(e, j);
                            } else {
                                score += e.points;
                                removeBulletsFromShooter(e.id);
                                enemies.splice(j, 1);
                                updateUI();
                            }
                        }
                        break;
                    }
                }
            }
            
            for (let i = botBullets.length-1; i >= 0; i--) {
                const bullet = botBullets[i];
                for (let j = 0; j < enemies.length; j++) {
                    const e = enemies[j];
                    if (Math.hypot(bullet.x - e.x, bullet.y - e.y) < bullet.radius + e.r) {
                        e.hp -= bullet.damage;
                        botBullets.splice(i, 1);
                        if (e.hp <= 0) {
                            if (e.type === 'bomber') {
                                triggerBomberExplosion(e, j);
                            } else {
                                score += e.points;
                                removeBulletsFromShooter(e.id);
                                enemies.splice(j, 1);
                                updateUI();
                            }
                        }
                        break;
                    }
                }
            }
        }
        
        function handleEnemyBulletCollisions() {
            for (let i = enemyBullets.length-1; i >= 0; i--) {
                const bullet = enemyBullets[i];
                if (Math.hypot(bullet.x - player.x, bullet.y - player.y) < bullet.radius + player.radius) {
                    health--;
                    updateUI();
                    enemyBullets.splice(i, 1);
                    if (health <= 0) gameActive = false;
                    continue;
                }
                if (supportBot.active && Math.hypot(bullet.x - supportBot.x, bullet.y - supportBot.y) < bullet.radius + supportBot.radius) {
                    supportBot.hp--;
                    enemyBullets.splice(i, 1);
                    if (supportBot.hp <= 0) {
                        supportBot.active = false;
                        botRespawnTimer = botRespawnCooldown * 60;
                        updateUI();
                    }
                    continue;
                }
                for (let f of forts) {
                    if (!f.active) continue;
                    if (bullet.x > f.x && bullet.x < f.x + f.w && bullet.y > f.y && bullet.y < f.y + f.h) {
                        f.hp--;
                        enemyBullets.splice(i, 1);
                        if (f.hp <= 0) f.active = false;
                        break;
                    }
                }
            }
        }
        
        function updateEnemiesAndDamage() {
            if (!gameActive) return;
            
            for (let i = 0; i < enemies.length; i++) {
                const e = enemies[i];
                
                // SHOOTER: Tìm vật cản để núp (không lao vào)
                if (e.type === 'shooter') {
                    if (!e.coverObstacle || Math.hypot(e.x - (e.coverObstacle.x + e.coverObstacle.w/2), e.y - (e.coverObstacle.y + e.coverObstacle.h/2)) > 150) {
                        e.coverObstacle = findCoverObstacle(e.x, e.y);
                    }
                    
                    if (e.coverObstacle) {
                        // Di chuyển ra phía sau vật cản, hướng về player
                        let coverX = e.coverObstacle.x + e.coverObstacle.w/2;
                        let coverY = e.coverObstacle.y + e.coverObstacle.h/2;
                        let angleToPlayer = Math.atan2(player.y - coverY, player.x - coverX);
                        let targetX = coverX + Math.cos(angleToPlayer) * (e.coverObstacle.w/2 + e.r + 5);
                        let targetY = coverY + Math.sin(angleToPlayer) * (e.coverObstacle.h/2 + e.r + 5);
                        
                        let dx = targetX - e.x;
                        let dy = targetY - e.y;
                        let len = Math.hypot(dx, dy);
                        if (len > 0) {
                            e.x += (dx / len) * 0.8;
                            e.y += (dy / len) * 0.8;
                        }
                    } else {
                        // Không có vật cản, di chuyển bình thường
                        let newX = e.x + e.vx, newY = e.y + e.vy;
                        e.x = newX; e.y = newY;
                    }
                }
                
                // BOOM SHOOTER: Đuổi theo player
                if (e.type === 'boomshooter') {
                    let dx = player.x - e.x, dy = player.y - e.y;
                    let len = Math.hypot(dx, dy);
                    if (len > 0) {
                        e.x += (dx / len) * 1.2;
                        e.y += (dy / len) * 1.2;
                    }
                }
                
                // Các loại enemy khác di chuyển bình thường
                if (e.type !== 'shooter' && e.type !== 'boomshooter') {
                    let newX = e.x + e.vx, newY = e.y + e.vy;
                    e.x = newX; e.y = newY;
                }
                
                checkCollisionWithObstaclesForEnemy(e, e.r);
                checkCollisionWithFortsForEnemy(e, e.r);
                
                // SHOOTER bắn
                if (e.type === 'shooter') {
                    if (e.shootCooldown <= 0) {
                        enemyShoot(e);
                        e.shootCooldown = 75;
                    } else {
                        e.shootCooldown--;
                    }
                }
                
                // BOOM SHOOTER bắn đạn nổ
                if (e.type === 'boomshooter') {
                    if (e.shootCooldown <= 0) {
                        boomShooterShoot(e);
                        e.shootCooldown = 55;
                    } else {
                        e.shootCooldown--;
                    }
                }
                
                if (Math.hypot(player.x - e.x, player.y - e.y) < player.radius + e.r) {
                    if (e.type === 'runner') {
                        health -= 2;
                        updateUI();
                        const angle = Math.atan2(player.y - e.y, player.x - e.x);
                        player.x += Math.cos(angle) * 20;
                        player.y += Math.sin(angle) * 20;
                        player.x = Math.min(Math.max(player.x, 20), MAP_W - 20);
                        player.y = Math.min(Math.max(player.y, 20), MAP_H - 20);
                        checkCollisionWithObstaclesForPlayer(player, player.radius);
                        removeBulletsFromShooter(e.id);
                        enemies.splice(i, 1);
                        i--;
                        if (health <= 0) gameActive = false;
                        continue;
                    } else {
                        health--;
                        updateUI();
                        removeBulletsFromShooter(e.id);
                        enemies.splice(i, 1);
                        i--;
                        if (health <= 0) gameActive = false;
                        continue;
                    }
                }
                
                let attackedFort = false;
                for (let f of forts) {
                    if (!f.active) continue;
                    if (Math.abs(e.x - (f.x + f.w/2)) < e.r + f.w/2 && Math.abs(e.y - (f.y + f.h/2)) < e.r + f.h/2) {
                        f.hp--;
                        if (f.hp <= 0) f.active = false;
                        attackedFort = true;
                        break;
                    }
                }
                if (attackedFort) {
                    removeBulletsFromShooter(e.id);
                    enemies.splice(i, 1);
                    i--;
                    continue;
                }
                
                if (supportBot.active && Math.hypot(supportBot.x - e.x, supportBot.y - e.y) < supportBot.radius + e.r) {
                    supportBot.hp--;
                    const angle = Math.atan2(e.y - supportBot.y, e.x - supportBot.x);
                    supportBot.x -= Math.cos(angle) * 14;
                    supportBot.y -= Math.sin(angle) * 14;
                    if (supportBot.hp <= 0) {
                        supportBot.active = false;
                        botRespawnTimer = botRespawnCooldown * 60;
                        updateUI();
                    }
                    removeBulletsFromShooter(e.id);
                    enemies.splice(i, 1);
                    i--;
                    continue;
                }
                
                if (e.x < -200 || e.x > MAP_W + 200 || e.y < -200 || e.y > MAP_H + 200) {
                    removeBulletsFromShooter(e.id);
                    enemies.splice(i, 1);
                    i--;
                }
            }
        }
        
        function updateSpawning() {
            if (!gameActive) return;
            if (enemySpawnCooldown <= 0 && enemies.length < RESPAWN_THRESHOLD) {
                spawnEnemy();
                if (score > 200 && Math.random() < 0.25 && enemies.length < RESPAWN_THRESHOLD) spawnEnemy();
                if (score > 450 && Math.random() < 0.15 && enemies.length < RESPAWN_THRESHOLD) spawnEnemy();
                let delay = Math.max(28, BASE_SPAWN_DELAY - Math.floor(score / 300));
                enemySpawnCooldown = Math.min(delay, 45);
            } else {
                enemySpawnCooldown--;
            }
        }
        
        function updateAutoShoot() {
            if (!gameActive) return;
            if (shootTimer <= 0) {
                shootTowardsMouse();
                shootTimer = SHOOT_DELAY_FRAMES;
            } else {
                shootTimer--;
            }
        }
        
        function updateBotShoot() {
            if (!gameActive || !supportBot.active) return;
            if (supportBot.shootTimer <= 0) {
                shootFromBot();
                supportBot.shootTimer = supportBot.shootDelay;
            } else {
                supportBot.shootTimer--;
            }
        }
        
        function updateCamera() {
            cameraX = player.x - CAM_W/2;
            cameraY = player.y - CAM_H/2;
            cameraX = Math.min(Math.max(cameraX, 0), MAP_W - CAM_W);
            cameraY = Math.min(Math.max(cameraY, 0), MAP_H - CAM_H);
        }
        
        function updateUI() {
            hpSpan.innerText = health;
            scoreSpan.innerText = score;
            let activeForts = forts.filter(f => f.active).length;
            fortCountSpan.innerText = activeForts;
            if (fortLimitSpan) fortLimitSpan.innerText = `/10`;
            if (supportBot.active) {
                botStatusSpan.innerText = "ACTIVE";
                botStatusSpan.style.color = "#44aaff";
                respawnTimerDiv.innerText = "🤖 BOT ACTIVE";
            } else {
                botStatusSpan.innerText = "DESTROYED";
                botStatusSpan.style.color = "#ff6666";
                if (botRespawnTimer > 0) {
                    let seconds = Math.ceil(botRespawnTimer / 60);
                    respawnTimerDiv.innerText = `⏳ RESPAWN: ${seconds}s`;
                } else {
                    respawnTimerDiv.innerText = "✅ PRESS 'R' TO RESPAWN (50)";
                }
            }
            lockIndicator.innerText = movementLocked ? "🔒 DI CHUYỂN: KHOÁ" : "🔓 DI CHUYỂN: BẬT";
            lockIndicator.style.color = movementLocked ? "#ff8888" : "#88ff88";
        }
        
        function toScreenX(worldX) { return worldX - cameraX; }
        function toScreenY(worldY) { return worldY - cameraY; }
        
        function showPlayAgainButton() {
            let existingBtn = document.querySelector('.play-again-btn');
            if (existingBtn) existingBtn.remove();
            
            const btn = document.createElement('button');
            btn.innerText = '🔄 PLAY AGAIN 🔄';
            btn.className = 'play-again-btn';
            btn.onclick = () => {
                btn.remove();
                initGame();
            };
            document.querySelector('.game-container').appendChild(btn);
        }
        
        // VẼ
        function drawMap() {
            ctx.fillStyle = "#030e03";
            ctx.fillRect(0, 0, CAM_W, CAM_H);
            ctx.strokeStyle = "#0f3f1a";
            ctx.lineWidth = 1;
            for (let x = Math.floor(cameraX/50)*50; x < cameraX + CAM_W; x += 50) {
                ctx.beginPath();
                ctx.moveTo(toScreenX(x), 0);
                ctx.lineTo(toScreenX(x), CAM_H);
                ctx.stroke();
            }
            for (let y = Math.floor(cameraY/50)*50; y < cameraY + CAM_H; y += 50) {
                ctx.beginPath();
                ctx.moveTo(0, toScreenY(y));
                ctx.lineTo(CAM_W, toScreenY(y));
                ctx.stroke();
            }
        }
        
        function drawObstacles() {
            for (let obs of obstacles) {
                let screenX = toScreenX(obs.x), screenY = toScreenY(obs.y);
                if (screenX + obs.w < 0 || screenX > CAM_W || screenY + obs.h < 0 || screenY > CAM_H) continue;
                ctx.fillStyle = obs.type === 'building' ? '#4a6a3a' : '#5a5a4a';
                ctx.fillRect(screenX, screenY, obs.w, obs.h);
                ctx.strokeStyle = "#8aba6a";
                ctx.strokeRect(screenX, screenY, obs.w, obs.h);
            }
        }
        
        function drawForts() {
            for (let fort of forts) {
                if (!fort.active) continue;
                let screenX = toScreenX(fort.x), screenY = toScreenY(fort.y);
                if (screenX + fort.w < 0 || screenX > CAM_W || screenY + fort.h < 0 || screenY > CAM_H) continue;
                ctx.fillStyle = "#8B6914";
                ctx.fillRect(screenX, screenY, fort.w, fort.h);
                ctx.strokeStyle = "#DAA520";
                ctx.lineWidth = 2;
                ctx.strokeRect(screenX, screenY, fort.w, fort.h);
                const hpPercent = fort.hp / fort.maxHp;
                ctx.fillStyle = "#ff3333";
                ctx.fillRect(screenX, screenY - 8, fort.w * hpPercent, 4);
                ctx.fillStyle = "#FFD700";
                ctx.fillRect(screenX + 10, screenY + 15, 15, 15);
                ctx.fillRect(screenX + fort.w - 25, screenY + 15, 15, 15);
            }
        }
        
        function drawPlayer() {
            const angle = Math.atan2(mouseWorld.y - player.y, mouseWorld.x - player.x);
            ctx.save();
            ctx.translate(toScreenX(player.x), toScreenY(player.y));
            ctx.rotate(angle);
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.arc(0, 0, player.radius + 2, 0, Math.PI * 2);
            ctx.strokeStyle = "#73ff73";
            ctx.lineWidth = 1.8;
            ctx.stroke();
            ctx.fillStyle = "#b3ffb3";
            ctx.beginPath();
            ctx.moveTo(18, 0);
            ctx.lineTo(-10, -11);
            ctx.lineTo(-10, 11);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = "#f9f9a3";
            ctx.beginPath();
            ctx.arc(4, 0, 3.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
        
        function drawSupportBot() {
            if (!supportBot.active) {
                ctx.save();
                ctx.translate(toScreenX(supportBot.x), toScreenY(supportBot.y));
                ctx.globalAlpha = 0.5;
                ctx.beginPath();
                ctx.arc(0, 0, supportBot.radius, 0, Math.PI * 2);
                ctx.fillStyle = "#666666";
                ctx.fill();
                ctx.fillStyle = "#ff4444";
                ctx.font = "bold 16px monospace";
                ctx.fillText("💀", -8, -8);
                if (botRespawnTimer > 0) {
                    let seconds = Math.ceil(botRespawnTimer / 60);
                    ctx.font = "bold 10px monospace";
                    ctx.fillStyle = "#ffaa66";
                    ctx.fillText(`${seconds}s`, -12, 18);
                }
                ctx.globalAlpha = 1;
                ctx.restore();
                return;
            }
            ctx.save();
            ctx.translate(toScreenX(supportBot.x), toScreenY(supportBot.y));
            const hpPercent = supportBot.hp / supportBot.maxHp;
            ctx.fillStyle = "#ff3333";
            ctx.fillRect(-supportBot.radius - 2, -supportBot.radius - 8, (supportBot.radius * 2 + 4) * hpPercent, 4);
            ctx.beginPath();
            ctx.arc(0, 0, supportBot.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#3399ff";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(0, 0, supportBot.radius - 3, 0, Math.PI * 2);
            ctx.fillStyle = "#55ccff";
            ctx.fill();
            const angleToPlayer = Math.atan2(player.y - supportBot.y, player.x - supportBot.x);
            const eyeX = Math.cos(angleToPlayer) * (supportBot.radius * 0.5);
            const eyeY = Math.sin(angleToPlayer) * (supportBot.radius * 0.5);
            ctx.beginPath();
            ctx.arc(eyeX, eyeY, 2.5, 0, Math.PI * 2);
            ctx.fillStyle = "white";
            ctx.fill();
            ctx.restore();
        }
        
        function drawBullets() {
            for (let b of bullets) { ctx.beginPath(); ctx.arc(toScreenX(b.x), toScreenY(b.y), b.radius - 1, 0, Math.PI*2); ctx.fillStyle = "#ffec80"; ctx.fill(); }
            for (let b of botBullets) { ctx.beginPath(); ctx.arc(toScreenX(b.x), toScreenY(b.y), b.radius - 1, 0, Math.PI*2); ctx.fillStyle = "#88ccff"; ctx.fill(); }
            for (let b of enemyBullets) { ctx.beginPath(); ctx.arc(toScreenX(b.x), toScreenY(b.y), b.radius - 1, 0, Math.PI*2); ctx.fillStyle = "#ff6688"; ctx.fill(); }
            for (let b of boomBullets) { ctx.beginPath(); ctx.arc(toScreenX(b.x), toScreenY(b.y), b.radius, 0, Math.PI*2); ctx.fillStyle = "#ff44ff"; ctx.fill(); ctx.beginPath(); ctx.arc(toScreenX(b.x), toScreenY(b.y), b.radius-2, 0, Math.PI*2); ctx.fillStyle = "#ffff00"; ctx.fill(); }
        }
        
        function drawEnemies() {
            for (let e of enemies) {
                let screenX = toScreenX(e.x), screenY = toScreenY(e.y);
                if (screenX + e.r < 0 || screenX - e.r > CAM_W || screenY + e.r < 0 || screenY - e.r > CAM_H) continue;
                if ((e.type === 'tanker' || e.type === 'bomber' || e.type === 'boomshooter') && e.maxHp > 1) {
                    const hpPercent = e.hp / e.maxHp;
                    ctx.fillStyle = "#ff3333";
                    ctx.fillRect(screenX - e.r - 2, screenY - e.r - 6, (e.r * 2 + 4) * hpPercent, 4);
                }
                ctx.beginPath();
                ctx.arc(screenX, screenY, e.r, 0, Math.PI*2);
                ctx.fillStyle = e.color;
                ctx.fill();
                ctx.font = `${e.r - 4}px monospace`;
                ctx.fillStyle = "white";
                if (e.type === 'runner') ctx.fillText("⚡", screenX - 5, screenY + 5);
                else if (e.type === 'tanker') ctx.fillText("🛡️", screenX - 6, screenY + 5);
                else if (e.type === 'shooter') ctx.fillText("🔫", screenX - 5, screenY + 5);
                else if (e.type === 'bomber') ctx.fillText("💣", screenX - 6, screenY + 6);
                else if (e.type === 'boomshooter') ctx.fillText("💥", screenX - 6, screenY + 6);
                
                if (e.type === 'boomshooter' && e.explosionTimer > 0) {
                    let timeLeft = Math.ceil(e.explosionTimer / 60);
                    ctx.font = "bold 10px monospace";
                    ctx.fillStyle = "#ffaa44";
                    ctx.fillText(`${timeLeft}s`, screenX - 8, screenY - 12);
                }
            }
        }
        
        function drawTeleporters() {
            for (let tp of teleporters) {
                let screenX = toScreenX(tp.x), screenY = toScreenY(tp.y);
                if (screenX + tp.radius < 0 || screenX - tp.radius > CAM_W || screenY + tp.radius < 0 || screenY - tp.radius > CAM_H) continue;
                ctx.beginPath();
                ctx.arc(screenX, screenY, tp.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(170, 68, 255, 0.5)`;
                ctx.fill();
                ctx.font = "20px monospace";
                ctx.fillStyle = "#ffffff";
                ctx.fillText("🌀", screenX - 10, screenY + 7);
            }
        }
        
        function drawExplosions() {
            for (let i = 0; i < explosions.length; i++) {
                const exp = explosions[i];
                const alpha = exp.timer / 20;
                const radius = exp.isBig ? 160 : (exp.boomRadius ? exp.boomRadius : (exp.isWarning ? 65 : 75));
                ctx.beginPath();
                ctx.arc(toScreenX(exp.x), toScreenY(exp.y), radius * (1 - alpha), 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 50, 0, ${0.6 * alpha})`;
                ctx.fill();
                if (exp.boomRadius) {
                    ctx.beginPath();
                    ctx.arc(toScreenX(exp.x), toScreenY(exp.y), radius * 0.5 * (1 - alpha), 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 200, 0, ${0.8 * alpha})`;
                    ctx.fill();
                }
                ctx.font = `${22}px monospace`;
                ctx.fillStyle = `rgba(255, 200, 0, ${alpha})`;
                if (exp.isWarning) ctx.fillText("⚠️", toScreenX(exp.x) - 12, toScreenY(exp.y) - 20);
                else if (exp.isTeleportSpawn) ctx.fillText("💣", toScreenX(exp.x) - 12, toScreenY(exp.y) - 18);
                else if (exp.isBoom) ctx.fillText("💥", toScreenX(exp.x) - 15, toScreenY(exp.y) - 15);
                else ctx.fillText("💥", toScreenX(exp.x) - 15, toScreenY(exp.y) - 15);
                exp.timer--;
                if (exp.timer <= 0) explosions.splice(i, 1);
            }
        }
        
        function drawHealEffects() {
            for (let i = 0; i < healEffects.length; i++) {
                const heal = healEffects[i];
                const alpha = heal.timer / 20;
                ctx.font = `${16}px monospace`;
                ctx.fillStyle = `rgba(100, 255, 100, ${alpha})`;
                ctx.fillText("+1 HP", toScreenX(heal.x) - 15, toScreenY(heal.y) - 20);
                heal.timer--;
                if (heal.timer <= 0) healEffects.splice(i, 1);
            }
        }
        
        function drawMouseTarget() {
            if (!mouseInside) return;
            let screenX = toScreenX(mouseWorld.x), screenY = toScreenY(mouseWorld.y);
            if (screenX < 0 || screenX > CAM_W || screenY < 0 || screenY > CAM_H) return;
            ctx.beginPath();
            ctx.arc(screenX, screenY, 8, 0, Math.PI * 2);
            ctx.strokeStyle = "#88ff88";
            ctx.lineWidth = 2.2;
            ctx.stroke();
            if (gameActive && score >= FORT_COST && forts.filter(f=>f.active).length < MAX_FORTS) {
                ctx.beginPath();
                ctx.rect(screenX - 30, screenY - 30, 60, 60);
                ctx.strokeStyle = "rgba(255,200,0,0.5)";
                ctx.stroke();
            }
        }
        
        function drawUItext() {
            ctx.font = "bold 12px monospace";
            ctx.fillStyle = "#aaffaa88";
            ctx.fillText(`🏃 RUNNER | 🛡️ TANKER | 🔫 SHOOTER | 💣 BOMBER | 💥 BOOM SHOOTER | 🧱 FORT (MAX 10)`, 15, 30);
            ctx.fillStyle = "#88dd88";
            ctx.fillText(`⚡ R: RESPAWN BOT (50) | CLICK: LOCK | HOLD 3s: BUILD | ENEMY: ${enemies.length}/${MAX_ENEMIES}`, 15, 55);
            ctx.font = "bold 13px monospace";
            ctx.fillStyle = "#80ffaa";
            ctx.fillText(`SCORE: ${score}`, CAM_W-120, 30);
        }
        
        function drawBuildProgress() {
            if (isHolding && buildRequested) {
                let elapsed = Date.now() - mouseHoldStart;
                let percent = Math.min(100, Math.floor((elapsed / BUILD_HOLD_TIME) * 100));
                buildProgressDiv.style.display = "block";
                buildProgressDiv.innerText = `🏗️ ĐANG XÂY... ${percent}%`;
                if (elapsed >= BUILD_HOLD_TIME) {
                    buildProgressDiv.style.display = "none";
                    if (tryPlaceFort()) {
                        // Xây thành công
                    }
                    isHolding = false;
                    buildRequested = false;
                }
            } else if (!isHolding) {
                buildProgressDiv.style.display = "none";
            }
        }
        
        function drawGameOverlay() {
            if (!gameActive && health <= 0) {
                ctx.font = "bold 34px 'Courier New', monospace";
                ctx.fillStyle = "#ff3366";
                ctx.fillText("GAME OVER", CAM_W/2-120, CAM_H/2-45);
                ctx.font = "18px monospace";
                ctx.fillStyle = "#88dd88";
                ctx.fillText(`FINAL SCORE: ${score}`, CAM_W/2-85, CAM_H/2+15);
                showPlayAgainButton();
                return true;
            }
            return false;
        }
        
        // GAME LOOP
        function gameLoop() {
            if (gameActive && health > 0) {
                updatePlayer();
                updateSupportBot();
                updateAutoShoot();
                updateBotShoot();
                updateBullets();
                handleBoomBullets();
                updateEnemiesAndDamage();
                handleCollisionsBulletEnemy();
                handleEnemyBulletCollisions();
                handleBomberExplosions();
                updateSpawning();
                spawnTeleporter();
                handleTeleporters();
                updateCamera();
                drawBuildProgress();
                
                if (health <= 0) {
                    gameActive = false;
                    updateUI();
                }
            }
            
            drawMap();
            drawObstacles();
            drawForts();
            drawTeleporters();
            drawBullets();
            drawEnemies();
            drawSupportBot();
            drawPlayer();
            drawExplosions();
            drawHealEffects();
            drawMouseTarget();
            drawUItext();
            drawGameOverlay();
            
            requestAnimationFrame(gameLoop);
        }
        
        // SỰ KIỆN
        function onMouseMove(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = CAM_W / rect.width, scaleY = CAM_H / rect.height;
            let screenX = (e.clientX - rect.left) * scaleX;
            let screenY = (e.clientY - rect.top) * scaleY;
            mouseWorld.x = cameraX + screenX;
            mouseWorld.y = cameraY + screenY;
            mouseWorld.x = Math.min(Math.max(mouseWorld.x, 0), MAP_W);
            mouseWorld.y = Math.min(Math.max(mouseWorld.y, 0), MAP_H);
            mouseInside = true;
        }
        
        function onMouseLeave() { 
            mouseInside = false;
            if (isHolding) {
                isHolding = false;
                buildRequested = false;
                buildProgressDiv.style.display = "none";
            }
        }
        function onMouseEnter(e) { mouseInside = true; onMouseMove(e); }
        
        function onMouseDown(e) {
            e.preventDefault();
            if (!gameActive) return;
            
            // Click 1 lần: khoá di chuyển (không xây)
            if (!isHolding) {
                movementLocked = !movementLocked;
                updateUI();
            }
            
            // Bắt đầu giữ chuột để xây
            isHolding = true;
            buildRequested = true;
            mouseHoldStart = Date.now();
        }
        
        function onMouseUp(e) {
            e.preventDefault();
            // Huỷ xây nếu chưa đủ 3s
            isHolding = false;
            buildRequested = false;
            buildProgressDiv.style.display = "none";
        }
        
        function onKeyDown(e) {
            if (e.key === 'r' || e.key === 'R') {
                e.preventDefault();
                respawnBotInstant();
            }
        }
        
        canvas.addEventListener('mousemove', onMouseMove);
        canvas.addEventListener('mouseleave', onMouseLeave);
        canvas.addEventListener('mouseenter', onMouseEnter);
        canvas.addEventListener('mousedown', onMouseDown);
        canvas.addEventListener('mouseup', onMouseUp);
        window.addEventListener('keydown', onKeyDown);
        
        function initGame() {
            gameActive = true;
            health = 20;
            score = 0;
            bullets = [];
            botBullets = [];
            enemyBullets = [];
            boomBullets = [];
            explosions = [];
            healEffects = [];
            teleporters = [];
            enemies = [];
            forts = [];
            teleportCooldown = 0;
            movementLocked = false;
            nextEnemyId = 1;
            window.spawnedMilestones = {};
            player.x = MAP_W/2; player.y = MAP_H/2;
            supportBot.active = true;
            supportBot.hp = supportBot.maxHp;
            supportBot.healTimer = 0;
            supportBot.selfHealTimer = 0;
            supportBot.x = MAP_W/2 - 45; supportBot.y = MAP_H/2 + 30;
            mouseWorld.x = MAP_W/2; mouseWorld.y = MAP_H/2;
            shootTimer = 0;
            enemySpawnCooldown = 10;
            botRespawnTimer = 0;
            generateObstacles();
            updateCamera();
            for(let i = 0; i < 3; i++) spawnEnemy();
            updateUI();
            
            let existingBtn = document.querySelector('.play-again-btn');
            if (existingBtn) existingBtn.remove();
        }
        
        initGame();
        gameLoop();
    })();
</script>
</body>
</html>
